<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Same gradient as before: #0891B2 → #7C3AED at 135deg -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Standard macOS app icon drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background with macOS padding (50px on each side) and drop shadow -->
  <rect x="50" y="50" width="412" height="412" rx="115" ry="115" fill="url(#bg)" filter="url(#shadow)"/>

  <!--
    Paper airplane icon from Heroicons (MIT License)
    https://heroicons.com — "paper-airplane" solid
    Original viewBox: 0 0 24 24
    Scaled to fit 206x206 area centered in 512x512 canvas:
    scale = 206/24 ≈ 8.5833, translate = (153, 153)
  -->
  <g transform="translate(153, 153) scale(8.5833)">
    <path
      d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"
      fill="white"
    />
  </g>
</svg>
